<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="menuA4.css">
    <title>Document</title>
</head>

<body>

    <!-- 1 PAGE -->
    <div class="menu_print">
        <!-- <div class="header">
            <img src="./image/logo_white.png" alt="" class="logo">
        </div> -->

        <div class="menu_container">
            <div class="column">
                <div class="menu__block">
                    <div class="section" id="cold-dishes">
                        <div class="title">
                            <p>Холодные закуски</p>
                        </div>
                        <div class="section_template">

                        </div>
                    </div>
                </div>
                <div class="menu__photo" style="height: 27%;">
                    <img class="image" src="./food/1.JPG" alt="">
                    <img class="image" src="./food/2.JPG" alt="">
                    <img class="image" src="./food/3.png" alt="">
                    <img class="image" src="./food/4.png" alt="">
                </div>
                <div class="menu__block">
                    <div class="section" id="home-sauce">
                        <div class="title">
                            <p>Соусы домашние</p>
                        </div>
                        <div class="section_template">

                        </div>
                    </div>
                </div>
            </div>

            <div class="column">
                <img src="./image/logo_white.png" alt="" class="logo">
                <div class="menu__block">
                    <div class="section" id="hot-dishes">
                        <div class="title">
                            <p>Горячие закуски</p>
                        </div>
                        <div class="section_template">

                        </div>
                    </div>
                </div>

                <div class="menu__block">
                    <div class="section" id="sauce">
                        <!-- <div class="title">
                        <p>Соусы классические</p>
                    </div> -->
                        <div class="section_template">

                        </div>
                    </div>
                </div>
                <dib class="qr__block">
                    <img src="./image/arrow.png" alt="" class="arrow arrow--vk">
                    <img src="./image/arrow.png" alt="" class="arrow arrow--tg">
                    <img src="./image/vk.png" alt="" class="social social--vk">
                    <img src="./image/telegram.png" alt="" class="social social--tg">
                    <img class="qr" src="./image/telegramQR.png" alt="">
                    <p class="qr__text">Больше новостей в наших каналах</p>
                    <img class="qr" src="./image/vkQR.jpg" alt="">
                </dib>
            </div>

            <div class="column">
                <div class="menu__block">
                    <div class="section" id="food">
                        <div class="title">
                            <p>Бургеры / сэндвичи</p>
                        </div>
                        <div class="section_template">

                        </div>

                        <p class="menu_comment">Бургеры и сэндвичи мы можем приготовить в открытом виде!</p>
                    </div>
                </div>
                <div class="menu__photo" style="height: 24.5%;">
                    <img class="image" src="./food/5.jpg" alt="">
                    <img class="image" src="./food/6.png" alt="">
                    <img class="image" src="./food/7.JPG" alt="">
                    <img class="image" src="./food/8.JPG" alt="">
                </div>
                <div class="menu__block">
                    <div class="section" id="salad">
                        <div class="title">
                            <p>Салаты</p>
                        </div>
                        <div class="section_template">

                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>



    <template id="menuTemplate">
        <div class="food">
            <div class="row">
                <div class="food_name"></div>
                <div class="dots">&nbsp;|&nbsp;</div>
                <div class="food_price"></div><span>&nbsp;&#8381;</span>
            </div>
            <div class="food_desc"></div>
        </div>
    </template>

    <script src="menu.js"></script>

</body>

</html>
